# Publishing_Adapter — the only write path to the live WordPress site. Depends only on Core_Package.
[project]
name = "wo-publishing-adapter"
version = "0.1.0"
description = "Publishing_Adapter: scoped, authenticated WordPress REST client; the only subsystem with live write access."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["publishing_adapter"]

[tool.uv.sources]
wo-core = { workspace = true }
