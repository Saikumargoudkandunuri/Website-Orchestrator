[project]
name = "wo-agentic"
version = "0.1.0"
description = "Website Orchestrator M6 Agentic Intelligence Layer."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "wo-brain",
    "wo-growth",
    "pydantic>=2.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agentic"]

[tool.pytest.ini_options]
testpaths = ["tests"]
