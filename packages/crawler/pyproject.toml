# Crawler — polite, safe, same-domain crawling. Depends only on Core_Package.
[project]
name = "wo-crawler"
version = "0.1.0"
description = "Crawler: polite same-domain page discovery and retrieval without JavaScript execution."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "httpx",
    "beautifulsoup4",
    "lxml",
    "tldextract",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crawler"]

[tool.uv.sources]
wo-core = { workspace = true }
