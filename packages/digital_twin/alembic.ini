# Alembic configuration for the Digital_Twin persistence layer.
#
# The database URL is intentionally NOT set here. It is resolved at runtime by
# migrations/env.py from Core_Package configuration (core.config -> DATABASE_URL,
# Req 14.1), so the connection string is never duplicated or committed here.
#
# Run migrations from this directory:
#     alembic upgrade head
#     alembic revision --autogenerate -m "message"

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = migrations

# Template used to generate migration file names; a date prefix keeps them
# ordered chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Use os.pathsep-separated paths; "." adds the current dir so env.py can import.
prepend_sys_path = .

# Timezone for file_template timestamps.
timezone = UTC

[post_write_hooks]
# No post-write hooks configured.

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
