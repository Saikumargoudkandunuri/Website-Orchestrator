# Digital_Twin — relational model of the crawled site. Depends only on Core_Package.
[project]
name = "wo-digital-twin"
version = "0.1.0"
description = "Digital_Twin: relational persistence (SQLAlchemy/PostgreSQL) of pages, links, metadata, issues, fixes, and audit trail."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "sqlalchemy>=2",
    "alembic",
    # PostgreSQL driver matching DATABASE_URL (postgresql+psycopg://...).
    "psycopg[binary]>=3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["digital_twin"]

[tool.uv.sources]
wo-core = { workspace = true }
