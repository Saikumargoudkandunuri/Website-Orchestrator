# Core_Package — the dependency-free foundation every subsystem builds on.
#
# Requirement 15.2 / 15.6: Core_Package MUST NOT import or depend on any other
# subsystem package. It may depend on third-party libraries (pydantic,
# structlog, etc.) but never on `wo-crawler`, `wo-governance`, and so on.
[project]
name = "wo-core"
version = "0.1.0"
description = "Core_Package: shared types, exceptions, interfaces, events, results, constants, and utilities."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
    "pydantic-settings",
    "structlog",
    "tldextract",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core"]
