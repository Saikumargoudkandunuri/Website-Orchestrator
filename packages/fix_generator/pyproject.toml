# Fix_Generator — pure transform from Issue to SuggestedFix. Depends only on Core_Package.
[project]
name = "wo-fix-generator"
version = "0.1.0"
description = "Fix_Generator: pure transformation turning a detected Issue into at most one SuggestedFix."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "beautifulsoup4",
    "lxml",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fix_generator"]

[tool.uv.sources]
wo-core = { workspace = true }
