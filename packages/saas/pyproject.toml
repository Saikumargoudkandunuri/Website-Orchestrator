[project]
name = "wo-saas"
version = "0.1.0"
description = "Website Orchestrator SaaS Platform Experience."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "wo-brain",
    "wo-agentic",
    "wo-growth",
    "wo-engines",
    "wo-intelligence",
    "fastapi",
    "pydantic>=2.4.0",
    "sqlalchemy>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["saas"]

[tool.pytest.ini_options]
testpaths = ["tests"]
