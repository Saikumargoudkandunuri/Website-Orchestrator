# Onboarding — the Foundation sub-project: workspace/project/website/connection
# onboarding, website detection, integration discovery, initial crawl, and
# digital-twin bootstrapping. Depends only on Core_Package plus the reusable
# subsystem contracts it integrates (crawler, digital_twin, publishing_adapter,
# editing). It does NOT re-implement those subsystems; it orchestrates them.
[project]
name = "wo-onboarding"
version = "0.1.0"
description = "Onboarding: workspace/project/website/connection onboarding, detection, and digital-twin bootstrap."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "wo-crawler",
    "wo-digital-twin",
    "wo-publishing-adapter",
    "sqlalchemy>=2",
    "alembic",
    "psycopg[binary]>=3",
    "pydantic>=2",
    "httpx",
    "beautifulsoup4",
    "lxml",
    "cryptography",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onboarding"]

[tool.uv.sources]
wo-core = { workspace = true }
wo-crawler = { workspace = true }
wo-digital-twin = { workspace = true }
wo-publishing-adapter = { workspace = true }
