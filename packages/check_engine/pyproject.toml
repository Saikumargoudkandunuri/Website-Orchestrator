# Check_Engine — deterministic, rule-based checks. Depends only on Core_Package.
[project]
name = "wo-check-engine"
version = "0.1.0"
description = "Check_Engine: deterministic, rule-based checks emitting structured issue candidates (no LLM)."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "beautifulsoup4",
    "lxml",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["check_engine"]

[tool.uv.sources]
wo-core = { workspace = true }
