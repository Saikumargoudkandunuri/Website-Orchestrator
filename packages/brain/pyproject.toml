# Brain — Milestone 5 Unified Intelligence Layer.
# Additive; depends on wo-core, wo-intelligence, wo-engines, wo-growth. Never modifies M1/M2/M3/M4.
[project]
name = "wo-brain"
version = "0.1.0"
description = "Brain: unified intelligence layer providing cross-engine synthesis (SeoBrain), Website Knowledge Graph, Decision Engine, and platform-level provider registry."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "wo-intelligence",
    "wo-engines",
    "wo-growth",
    "sqlalchemy",
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["brain"]

[tool.uv.sources]
wo-core = { workspace = true }
wo-intelligence = { workspace = true }
wo-engines = { workspace = true }
wo-growth = { workspace = true }
