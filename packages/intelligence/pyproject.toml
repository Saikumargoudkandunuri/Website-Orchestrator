# Intelligence — Milestone 2 SEO Intelligence Layer. Additive; depends only on Core_Package.
[project]
name = "wo-intelligence"
version = "0.1.0"
description = "Intelligence: the persistent, versioned SEO Knowledge Object model, provider-agnostic AI layer, prompt/validation pipeline, and analyzers that deepen understanding of each page."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "sqlalchemy",
    "httpx",
    "beautifulsoup4",
    "lxml",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["intelligence"]

[tool.uv.sources]
wo-core = { workspace = true }
