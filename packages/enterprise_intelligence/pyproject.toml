[project]
name = "wo-enterprise-intelligence"
version = "0.1.0"
description = "Website Orchestrator Final Milestone — Autonomous Enterprise Intelligence Platform."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "wo-brain",
    "wo-agentic",
    "wo-growth",
    "wo-engines",
    "wo-intelligence",
    "pydantic>=2.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["enterprise_intelligence"]

[tool.pytest.ini_options]
testpaths = ["tests"]
