[project]
name = "wo-observability"
version = "0.1.0"
description = "Observability aggregator for the Website Orchestrator."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["observability"]
