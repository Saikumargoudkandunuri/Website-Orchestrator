# Growth — Milestone 4 Website Growth Engine.
# Additive; depends on wo-core, wo-intelligence, wo-engines. Never modifies M1/M2/M3.
[project]
name = "wo-growth"
version = "0.1.0"
description = "Growth: ten independently-structured growth engines (Content Generation, Content Optimization, Local SEO, Reputation Management, Rank Tracking, Reporting, Agency Management, Analytics Intelligence, Outreach, Automation)."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "wo-intelligence",
    "wo-engines",
    "sqlalchemy",
    "httpx",
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["growth"]

[tool.uv.sources]
wo-core = { workspace = true }
wo-intelligence = { workspace = true }
wo-engines = { workspace = true }
