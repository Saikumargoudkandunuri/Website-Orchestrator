# AI_Generator — real AI-backed content generation (Milestone 1). Depends only on Core_Package.
[project]
name = "wo-ai-generator"
version = "0.1.0"
description = "AI_Generator: LLM-backed AltTextGenerationService (plus a deterministic fake) that proposes real, accessible alt text; never publishes."
requires-python = ">=3.11"
dependencies = [
    "wo-core",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ai_generator"]

[tool.uv.sources]
wo-core = { workspace = true }
